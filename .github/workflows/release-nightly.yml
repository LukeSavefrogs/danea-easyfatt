name: Create Release (Nightly)

on:
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: write

concurrency:
  group: nightly-release
  cancel-in-progress: true

jobs:
  tests:
    uses: ./.github/workflows/run-tests.yml

  release_body:
    runs-on: ubuntu-latest
    outputs:
      changelog: ${{ steps.changelog-updated.outputs.changelog }}
    steps:
      - name: "🛒 Checkout repository"
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: "🧬 Read Unreleased section from CHANGELOG"
        uses: mindsers/changelog-reader-action@v2
        id: changelog
        with:
          version: Unreleased
          validation_level: "warn"
      
      - name: "Replace headers"
        id: changelog-updated
        run: |
          tempfile=$(mktemp)
          cat - <<'EOF' > "$tempfile"
          ${{ steps.changelog.outputs.changes }}
          EOF

          # Replace "Added", "Changed", "Deprecated", "Removed", "Fixed", "Security" with italian translations
          modified_changelog="$(
            sed -r \
              -e 's/^### Added/### Aggiunto/' \
              -e 's/^### Changed/### Modificato/' \
              -e 's/^### Deprecated/### Deprecato/' \
              -e 's/^### Removed/### Rimosso/' \
              -e 's/^### Fixed/### Risolto/' \
              -e 's/^### Security/### Sicurezza/' \
              "$tempfile"
          )"
          
          echo "changelog=\"$modified_changelog\"" >> $GITHUB_OUTPUT

  build-and-release:
    runs-on: windows-latest
    needs: [tests, release_body] # Require dependencies to finish
    steps:
      - name: "🛒 Checkout repository"
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: "📜 Install Poetry"
        uses: abatilo/actions-poetry@v2
        with:
          poetry-version: 1.3.2
          
      - name: "🐍 Install Python"
        uses: actions/setup-python@v5
        with:
          cache: 'poetry'
        
      - name: "🔍 Install dependencies"
        run: poetry install

      - name: "🎉 Generate artifacts"
        run: |
          poetry run build
      
      - name: Update Nightly Release
        uses: andelf/nightly-release@main
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          name: "Nightly Release"
          body: |
            Di seguito l'elenco delle modifiche introdotte in questa versione nightly.

            ${{ needs.release_body.outputs.changelog }}
          prerelease: true
          files: |
            ./dist/*.exe

      - name: "Set Job Summary"
        shell: bash
        run: |
          cat <<EOF >> $GITHUB_STEP_SUMMARY
          ## Nightly Release
          Rilasciata la versione nightly con le seguenti modifiche:
          ${{ needs.release_body.outputs.changelog }}
          EOF
